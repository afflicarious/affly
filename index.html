<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link in Bio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            overflow-x: hidden;
            position: relative;
        }

        /* Background video styling */
        #bgVideo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
        }

        /* Dark overlay for better readability */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: -1;
        }

        /* Full-screen typewriter overlay */
        #splashScreen {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            text-align: center;
            cursor: pointer;
            opacity: 1;
            transition: opacity 0.5s ease;
        }

        #splashScreen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #splashScreen .overlay-text {
            font-family: 'Courier New', Courier, monospace;
            color: #fff;
            font-size: 24px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }


        /* Glass container */
        .glass-container {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(138, 43, 226, 0.18);
            border-radius: 30px;
            padding: 40px 30px;
            width: 90%;
            max-width: 380px;
            box-shadow: 0 0 50px rgba(138, 43, 226, 0.2);
            text-align: center;
            animation: slideUp 0.6s ease-out;
            transform-style: preserve-3d;
            transition: transform 0.05s ease-out;
            will-change: transform;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Profile picture */
        .profile-image {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            display: block;
            margin: 0 auto 25px;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.35);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            animation: fadeIn 0.8s ease-out 0.2s both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        /* Name heading */
        .name {
            font-size: 32px;
            font-weight: 300;
            color: #fff;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 6px;
            overflow: hidden;
            white-space: nowrap;
            border-right: 2px solid rgba(255, 255, 255, 0.8);
            width: 6ch;
            margin: 0 auto 20px;
            animation: typewriterName 2s steps(5) 0.5s forwards, blink 0.75s step-end infinite;
        }

        @keyframes typewriterName {
            from { width: 0; }
            to { width: 6ch; }
        }

        @keyframes blink {
            50% { border-color: transparent; }
        }

        /* Bio text */
        .bio {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.85);
            text-align: center;
            margin-bottom: 30px;
            line-height: 1.6;
            animation: fadeIn 0.8s ease-out 0.4s both;
        }

        /* Links container */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Link button styling */
        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 20px;
                background: transparent;
                border: 1px solid rgba(138, 43, 226, 0.15);
                border-radius: 50px;
                color: #fff;
                font-size: 15px;
                font-weight: 600;
                text-decoration: none;
                cursor: pointer;
                transition: transform 0.2s ease, text-shadow 0.2s ease;
        }

        .link-btn:hover {
            background: transparent;
            color: #fff;
            transform: scale(1.02);
            text-shadow: 0 0 8px rgba(138, 43, 226, 0.8);
            border-color: rgba(138, 43, 226, 0.3);
            box-shadow: 0 0 35px rgba(138, 43, 226, 0.3), 0 12px 28px rgba(0, 0, 0, 0.18);
        }

        .link-btn:active {
            transform: translateY(0);
        }

        .petal-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: -1;
        }

        .petal-stack {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            height: 120px;
            pointer-events: none;
            overflow: hidden;
            z-index: -1;
        }

        .cherry-blossom {
            position: absolute;
            top: -60px;
            width: 50px;
            height: 50px;
            opacity: 0.95;
            animation: bubbleFall linear forwards;
            pointer-events: auto;
            cursor: pointer;
            filter: drop-shadow(0 0 8px rgba(138, 43, 226, 0.4));
        }

        .stack-blossom {
            position: absolute;
            width: 48px;
            height: 48px;
            opacity: 0.85;
            pointer-events: auto;
            cursor: pointer;
            filter: drop-shadow(0 0 6px rgba(138, 43, 226, 0.3));
        }

        @keyframes bubbleFall {
            to {
                transform: translate3d(0, 120vh, 0) scale(1.1);
                opacity: 0.3;
            }
        }

        @keyframes popBubble {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.15);
            }
            100% {
                transform: scale(0);
                opacity: 0;
            }
        }

        /* Glow styling */
        .name,
        .bio,
        .overlay-text,
        .link-btn {
            text-shadow: 0 0 20px rgba(102, 126, 234, 0.25);
        }

        /* Animation for buttons */
        .link-btn {
            animation: slideInButton 0.6s ease-out backwards;
        }

        .link-btn:nth-child(1) { animation-delay: 0.5s; }
        .link-btn:nth-child(2) { animation-delay: 0.55s; }
        .link-btn:nth-child(3) { animation-delay: 0.6s; }
        .link-btn:nth-child(4) { animation-delay: 0.65s; }
        .link-btn:nth-child(5) { animation-delay: 0.7s; }
        .link-btn:nth-child(6) { animation-delay: 0.75s; }

        @keyframes slideInButton {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Responsive design */
        @media (max-width: 480px) {
            .glass-container {
                padding: 30px 20px;
                max-width: 95%;
            }

            .name {
                font-size: 24px;
            }

            .bio {
                font-size: 13px;
            }

            .link-btn {
                padding: 12px 16px;
                font-size: 14px;
            }
        }

        @media (max-width: 360px) {
            .glass-container {
                padding: 25px 15px;
            }

            .profile-image {
                width: 100px;
                height: 100px;
            }

            .name {
                font-size: 22px;
                margin-bottom: 6px;
            }

            .bio {
                font-size: 12px;
                margin-bottom: 20px;
            }

            .links-container {
                gap: 10px;
            }

            .link-btn {
                padding: 11px 14px;
                font-size: 13px;
            }
        }

    </style>
</head>
<body>
    <audio id="popSound" preload="auto">
        <source src="pop.mp4" type="audio/mp4">
    </audio>

    <!-- Background video with audio baked into BG.MP4 -->
    <video id="bgVideo" autoplay muted playsinline loop>
        <source src="bg.mp4" type="video/mp4">
        Your browser does not support the video element.
    </video>

    <div class="petal-container" id="petalContainer"></div>
    <div class="petal-stack" id="petalStack"></div>

    <!-- Full-screen landing overlay -->
    <div id="splashScreen">
        <div class="overlay-text">Click to enter...</div>
    </div>

    <!-- Glass container with content -->
    <div class="glass-container" id="glassContainer">
        <!-- Profile picture -->
        <img src="pfp.jpg" alt="Profile Picture" class="profile-image">

        <!-- Name -->
        <h1 class="name">AFLY</h1>

        <!-- Bio -->
        <p class="bio">Trying to survive another boring day...</p>

        <!-- Links container -->
        <div class="links-container">
            <a href="https://instagram.com" target="_blank" class="link-btn">
                Instagram
            </a>
            <a href="https://linkedin.com" target="_blank" class="link-btn">
                LinkedIn
            </a>
            <a href="https://discord.com" target="_blank" class="link-btn">
                Discord
            </a>
            <a href="https://twitter.com" target="_blank" class="link-btn">
                Twitter
            </a>
            <a href="mailto:your.email@example.com" class="link-btn">
                Email
            </a>
            <a href="https://your-portfolio.com" target="_blank" class="link-btn">
                Portfolio
            </a>
        </div>
    </div>

    <script>
        const splashScreen = document.getElementById('splashScreen');
        const video = document.getElementById('bgVideo');
        const glassContainer = document.getElementById('glassContainer');
        let started = false;

        function enterApp() {
            splashScreen.classList.add('hidden');
            if (!started) {
                video.muted = false;
                video.play().catch(err => console.log('Play error:', err));
                started = true;
            }
        }

        splashScreen.addEventListener('click', () => {
            if (!splashScreen.classList.contains('hidden')) {
                enterApp();
            }
        });

        const petalContainer = document.getElementById('petalContainer');
        const petalStack = document.getElementById('petalStack');
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playPopSound() {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            const bufferSize = audioCtx.sampleRate * 0.08;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                const progress = i / bufferSize;
                data[i] = (Math.random() * 2 - 1) * (1 - progress) * 0.2;
            }
            const source = audioCtx.createBufferSource();
            source.buffer = buffer;
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'highpass';
            filter.frequency.value = 1200;
            source.connect(filter).connect(audioCtx.destination);
            source.start();
        }

        function createPetal() {
            const petal = document.createElement('div');
            petal.className = 'petal';
            const size = Math.random() * 20 + 5;
            const left = Math.random() * 90 + 5;
            const duration = Math.random() * 4 + 4;
            const delay = Math.random() * 3;
            petal.style.width = `${size}px`;
            petal.style.height = `${size}px`;
            petal.style.left = `${left}vw`;
            petal.style.animationDuration = `${duration}s`;
            petal.style.animationDelay = `${delay}s`;
            petal.style.opacity = 0;
            petal.style.transition = 'opacity 0.2s ease';
            petal.addEventListener('animationstart', () => petal.style.opacity = 0.75);
            petal.addEventListener('click', () => {
                petal.remove();
                playPopSound();
            });
            petal.addEventListener('touchstart', () => {
                petal.remove();
                playPopSound();
            });
            petal.addEventListener('animationend', () => {
                const stackPetal = document.createElement('div');
                stackPetal.className = 'stack-petal';
                stackPetal.style.width = `${size}px`;
                stackPetal.style.height = `${size}px`;
                stackPetal.style.left = `${left}vw`;
                stackPetal.style.bottom = '0';
                stackPetal.style.transform = `translateY(-${Math.random() * 20}px) rotate(${Math.random() * 360}deg)`;
                petalStack.appendChild(stackPetal);
                if (petalStack.childElementCount > 80) {
                    petalStack.removeChild(petalStack.firstChild);
                }
                petal.remove();
            });
            petalContainer.appendChild(petal);
        }

        setInterval(() => {
            if (petalContainer.childElementCount < 24) {
                createPetal();
            }
        }, 250);

        document.addEventListener('touchstart', (event) => {
            const { clientX, clientY } = event.touches[0];
            const edgeSize = 80;
            const isCorner = (
                (clientX < edgeSize && clientY < edgeSize) ||
                (clientX > window.innerWidth - edgeSize && clientY < edgeSize) ||
                (clientX < edgeSize && clientY > window.innerHeight - edgeSize) ||
                (clientX > window.innerWidth - edgeSize && clientY > window.innerHeight - edgeSize)
            );
            if (isCorner) {
                playPopSound();
            }
        });

        document.addEventListener('click', (event) => {
            const { clientX, clientY } = event;
            const edgeSize = 80;
            const isCorner = (
                (clientX < edgeSize && clientY < edgeSize) ||
                (clientX > window.innerWidth - edgeSize && clientY < edgeSize) ||
                (clientX < edgeSize && clientY > window.innerHeight - edgeSize) ||
                (clientX > window.innerWidth - edgeSize && clientY > window.innerHeight - edgeSize)
            );
            if (isCorner) {
                playPopSound();
            }
        });

        // ===== MAGNETIC BUTTON EFFECT =====
        const buttons = document.querySelectorAll('.link-btn');
        const magneticStrength = 30; // Pixels to move towards cursor

        document.addEventListener('mousemove', (e) => {
            const mouseX = e.clientX;
            const mouseY = e.clientY;

            buttons.forEach(button => {
                const rect = button.getBoundingClientRect();
                const buttonX = rect.left + rect.width / 2;
                const buttonY = rect.top + rect.height / 2;

                const distance = Math.sqrt(
                    Math.pow(mouseX - buttonX, 2) + Math.pow(mouseY - buttonY, 2)
                );

                if (distance < 100) {
                    const angle = Math.atan2(mouseY - buttonY, mouseX - buttonX);
                    const moveX = Math.cos(angle) * magneticStrength * (1 - distance / 100);
                    const moveY = Math.sin(angle) * magneticStrength * (1 - distance / 100);

                    button.style.transform = `translate(${moveX}px, ${moveY}px)`;
                } else {
                    button.style.transform = 'translate(0, 0)';
                }
            });
        });

        // ===== TILT EFFECT FOR GLASS CONTAINER =====
        let mouseX = 0;
        let mouseY = 0;
        const tiltStrength = 25; // Max rotation degrees

        document.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
            mouseY = (e.clientY / window.innerHeight - 0.5) * 2;

            const rotateX = -mouseY * tiltStrength;
            const rotateY = mouseX * tiltStrength;

            glassContainer.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });

        // Reset tilt when mouse leaves window
        document.addEventListener('mouseleave', () => {
            glassContainer.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg)';
        });

        // Touch support for mobile devices
        document.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            mouseX = (touch.clientX / window.innerWidth - 0.5) * 2;
            mouseY = (touch.clientY / window.innerHeight - 0.5) * 2;

            const rotateX = -mouseY * tiltStrength;
            const rotateY = mouseX * tiltStrength;

            glassContainer.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });

        document.addEventListener('touchend', () => {
            glassContainer.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg)';
        });
    </script>
</body>
</html>
